<!doctype html>
<html lang="en" ng-app="pharmacyApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PharmaCare</title>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/adhamCSS.css" />
    <link rel="stylesheet" href="assets/css/all.min.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />

    <script src="vendors/angular.min.js"></script>
    <script src="vendors/angular-route.js"></script>
    <script src="vendors/bootstrap.bundle.min.js"></script>
    <script src="vendors/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="app.js"></script>

    <!-- Services -->
    <script src="services/supabase.service.js"></script>
    <script src="services/auth.service.js"></script>
    <script src="services/medicines.service.js"></script>
    <script src="services/customers.service.js"></script>
    <script src="services/invoice.service.js"></script>
    <script src="services/orders.service.js"></script>
    <script src="services/users.service.js"></script>

    <!-- Directives -->
    <script src="directives/footer.directive.js"></script>
    <script src="directives/navbar.directive.js"></script>
    <script src="directives/sidebar.directive.js"></script>
    <script src="directives/navbar-dashboard.js"></script>
    <script src="directives/medicine-card.directive.js"></script>

    <!-- Controllers -->
    <script src="controllers/auth.controller.js"></script>
    <script src="controllers/register.controller.js"></script>
    <script src="controllers/sidebar.controller.js"></script>
    <script src="controllers/navbar-dashboard.controller.js"></script>
    <script src="controllers/dashboard.controller.js"></script>
    <script src="controllers/medicines.controller.js"></script>
    <script src="controllers/customers.controller.js"></script>
    <script src="controllers/invoice.controller.js"></script>
    <script src="controllers/sales-invoices.controller.js"></script>
    <script src="controllers/users.controller.js"></script>
    <script src="controllers/orders-history.controller.js"></script>
    <script src="controllers/shop.controller.js"></script>
    <script src="controllers/confirmation.controller.js"></script>
    <script src="controllers/customer-profile.controller.js"></script>
  </head>
  <body>
    <app-navbar ng-if="currentUser && currentUser.role === 'customer'"></app-navbar>
    <dashboard-navbar ng-if="currentUser && currentUser.role === 'admin'"></dashboard-navbar>

    <div
      class="main-content"
      ng-class="{'with-sidebar': currentUser && currentUser.role === 'admin'}"
    >
      <app-sidebar
        ng-if="currentUser && currentUser.role === 'admin'"
      ></app-sidebar>

      <div class="content-area">
        <ng-view></ng-view>
      </div>
    </div>

    <!-- Footer -->
    <footer-directive></footer-directive>
  </body>
</html>
